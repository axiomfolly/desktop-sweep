# Desktop Sweep — Configuration
# Place this file at ~/Desktop/Archive/config.cfg
# Lines starting with # are comments. Blank lines are ignored.

# ── Enabled ───────────────────────────────────────────────────
# Master switch. Set to false to pause archiving entirely.
ENABLED=true

# ── Schedule ──────────────────────────────────────────────────
# What time the launchd agent runs daily (24h format).
# Changing this requires re-running install.sh to take effect.
SCHEDULE_HOUR=9
SCHEDULE_MINUTE=0

# ── Logging ───────────────────────────────────────────────────
# Write move/skip actions to Archive/archive.log (true/false).
LOG_ENABLED=true

# ── Age Threshold ─────────────────────────────────────────────
# Files modified within this many days are left on the Desktop.
# Set to 0 to archive everything immediately.
AGE_THRESHOLD_DAYS=30

# ── Skip Specific Files ──────────────────────────────────────
# Comma-separated list of exact filenames to never archive.
# Example: SKIP_FILES=notes.txt,todo.md
SKIP_FILES=

# ── Skip File Extensions ─────────────────────────────────────
# Comma-separated list of extensions to never archive (without dot).
# Example: SKIP_EXTENSIONS=pdf,docx,xlsx
SKIP_EXTENSIONS=

# ── App Settings ──────────────────────────────────────────────
# Show Desktop Sweep icon in the menu bar (true/false).
SHOW_IN_MENU_BAR=false
